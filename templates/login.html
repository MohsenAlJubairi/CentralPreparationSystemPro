<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام بازرعه للطالب الجامعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.0">
    <!-- PWA Settings -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="سكن بازرعة">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='Images/logo.png') }}">
    <link rel="apple-touch-startup-image" href="{{ url_for('static', filename='Images/logo.png') }}">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Apply dark mode immediately
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-500">

    <!-- Wow Factor: Imaginary Glowing Orbs -->
    <div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary-500/20 dark:bg-primary-600/20 rounded-full blur-[100px] pointer-events-none animate-pulse-slow"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[600px] h-[600px] bg-amber-400/20 dark:bg-amber-500/10 rounded-full blur-[120px] pointer-events-none animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    <div class="absolute top-[20%] left-[10%] w-[300px] h-[300px] bg-purple-500/10 dark:bg-purple-600/20 rounded-full blur-[80px] pointer-events-none animate-pulse-slow" style="animation-delay: 2.5s;"></div>
    <div class="absolute bottom-[20%] right-[10%] w-[400px] h-[400px] bg-emerald-500/10 dark:bg-emerald-600/10 rounded-full blur-[90px] pointer-events-none animate-pulse-slow" style="animation-delay: 0.5s;"></div>

    <!-- Theme Toggle Button -->
    <button onclick="toggleDarkMode()" class="absolute top-6 left-6 z-50 w-12 h-12 rounded-full bg-white/50 dark:bg-slate-800/50 backdrop-blur-md border border-white/40 dark:border-slate-700/50 shadow-soft flex items-center justify-center text-slate-600 dark:text-amber-400 hover:scale-110 transition-all">
        <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
    </button>

    <div class="glass-panel p-8 md:p-10 rounded-3xl border border-white dark:border-slate-700 shadow-2xl w-full max-w-md relative z-10 mx-4 animate-slide-up">
        
        <div class="text-center mb-8 flex flex-col items-center justify-center">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='Images/logo.png') }}" alt="شعار سكن بازرعة" class="w-52 h-auto mx-auto hover:scale-105 transition-transform duration-300">
            </div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mt-2">نظام التحضير - سكن بازرعة للطالب الجامعي - العاصمة عدن</h2>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-rose-100 border border-rose-200 text-rose-700 px-4 py-3 rounded-xl relative mb-6 text-sm font-bold text-center shadow-sm flex items-center justify-center gap-2">
                  <i class="fa-solid fa-circle-exclamation text-lg"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">اسم المستخدم</label>
                <div class="relative">
                    <input type="text" name="username" autocomplete="username" required 
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pr-10 pl-4 outline-none focus:border-primary transition" 
                           placeholder="أدخل اسم المستخدم">
                    <i class="fa-solid fa-user absolute right-3 top-3.5 text-slate-400"></i>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" name="password" autocomplete="current-password" required 
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pr-10 pl-10 outline-none focus:border-primary transition font-mono" 
                           placeholder="••••••••">
                    <i class="fa-solid fa-lock absolute right-3 top-3.5 text-slate-400"></i>
                    
                    <button type="button" onclick="togglePassword()" tabindex="-1" class="absolute left-3 top-3.5 text-slate-400 hover:text-primary transition focus:outline-none">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center text-sm pt-1">
                <label class="flex items-center cursor-pointer text-slate-600 dark:text-slate-400 font-bold hover:text-primary transition select-none">
                    <input type="checkbox" name="remember" class="ml-2 accent-primary w-4 h-4 rounded">
                    تذكر بياناتي (إبقاء تسجيل الدخول)
                </label>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-primary-600 text-white py-3.5 rounded-xl font-bold transition shadow-lg shadow-primary-500/30 flex justify-center items-center gap-2 text-lg mt-2">
                <span>دخول</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
