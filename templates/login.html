<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام السكن الطلابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Tajawal', 'sans-serif'] }, colors: { primary: '#3b82f6', darkBg: '#0f172a' } } }
        }
    </script>
    
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.85); }
    </style>
</head>
<body class="bg-slate-100 dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-blue-400/30 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-emerald-400/20 rounded-full blur-3xl pointer-events-none"></div>

    <div class="glass-panel p-8 md:p-10 rounded-3xl border border-white dark:border-slate-700 shadow-2xl w-full max-w-md relative z-10 mx-4">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-building-user"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white">نظام السكن الطلابي</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">سجل دخولك للمتابعة</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-rose-100 border border-rose-200 text-rose-700 px-4 py-3 rounded-xl relative mb-6 text-sm font-bold text-center shadow-sm flex items-center justify-center gap-2">
                  <i class="fa-solid fa-circle-exclamation text-lg"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">اسم المستخدم</label>
                <div class="relative">
                    <input type="text" name="username" autocomplete="username" required 
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pr-10 pl-4 outline-none focus:border-primary transition" 
                           placeholder="أدخل اسم المستخدم">
                    <i class="fa-solid fa-user absolute right-3 top-3.5 text-slate-400"></i>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" name="password" autocomplete="current-password" required 
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl py-3 pr-10 pl-10 outline-none focus:border-primary transition font-mono" 
                           placeholder="••••••••">
                    <i class="fa-solid fa-lock absolute right-3 top-3.5 text-slate-400"></i>
                    
                    <button type="button" onclick="togglePassword()" tabindex="-1" class="absolute left-3 top-3.5 text-slate-400 hover:text-primary transition focus:outline-none">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center text-sm pt-1">
                <label class="flex items-center cursor-pointer text-slate-600 dark:text-slate-400 font-bold hover:text-primary transition select-none">
                    <input type="checkbox" name="remember" class="ml-2 accent-primary w-4 h-4 rounded">
                    تذكر بياناتي (إبقاء تسجيل الدخول)
                </label>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-blue-600 text-white py-3.5 rounded-xl font-bold transition shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2 text-lg mt-2">
                <span>دخول</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
