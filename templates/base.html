<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام السكن الطلابي{% endblock %}</title>
    
    <link rel="icon" href="{{ url_for('static', filename='Images/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}">    

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1e293b">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="سكن بازرعة">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='Images/logo.png') }}">
    <link rel="apple-touch-startup-image" href="{{ url_for('static', filename='Images/logo.png') }}">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-100 dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen flex">

    {% include 'components/sidebar.html' %}

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        {% include 'components/header.html' %}

        <div class="p-8 overflow-y-auto flex-1">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>    {% block scripts %}{% endblock %}
</body>
</html>
