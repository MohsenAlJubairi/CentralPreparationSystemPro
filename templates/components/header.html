<header class="sticky top-0 z-50 bg-white/80 dark:bg-[#0B1120]/80 backdrop-blur-md p-4 px-8 border-b border-slate-200 dark:border-amber-900/30 flex justify-between items-center shadow-sm transition-colors duration-300">
    <div class="flex items-center gap-3">
        <!-- خط زينة سماوي مضيء بجانب العنوان -->
        <div class="w-1.5 h-6 bg-amber-500 rounded-full shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white tracking-wide">
            {% block header_title %}لوحة التحكم{% endblock %}
        </h2>
    </div>
    
    <div class="flex items-center gap-4">
        <!-- شريط حالة صغير يعطي طابعاً احترافياً (اختياري) -->
        <div class="hidden sm:flex items-center text-xs font-bold text-slate-500 dark:text-amber-400/80 bg-slate-100 dark:bg-amber-950/30 px-3 py-1.5 rounded-full border border-slate-200 dark:border-amber-900/50">
            <i class="fa-solid fa-bolt text-amber-500 ml-2"></i> النظام متصل
        </div>
        
        <!-- زر الوضع الليلي بتصميم زجاجي وتأثير عند المرور -->
        <button onclick="toggleDarkMode()" class="relative p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 hover:border-amber-400 dark:hover:border-amber-500 hover:shadow-[0_0_15px_rgba(6,182,212,0.2)] transition-all duration-300 group">
            <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-amber-400 text-lg group-hover:rotate-12 transition-transform"></i>
        </button>
    </div>
</header>
